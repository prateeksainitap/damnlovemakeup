# DamnLove Makeup · Cloudflare Pages configuration
name = "damnlove-makeup"
compatibility_date = "2026-07-01"
pages_build_output_dir = "public"

# D1 database binding — replace database_id after `wrangler d1 create damnlove-bookings`
[[d1_databases]]
binding = "DB"
database_name = "damnlove-bookings"
database_id = "6b72ab03-0edc-4d0c-a1c6-4fbc29450814"

# ── Admin dashboard (set these as encrypted secrets/vars in the Pages dashboard) ──
# ADMIN_USER      = "laveena"          (Settings > Environment variables)
# ADMIN_PASSWORD  = "a-strong-password"  (mark as Secret / encrypted)
# SESSION_SECRET  = "a-long-random-string"
# ADMIN_TOKEN     = "another-long-random-string"  (for /api/bookings?token= JSON export)
